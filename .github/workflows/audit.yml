name: Security audit

on:
  schedule:
    - cron: "0 8 * * 1" # Monday 8am UTC
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
